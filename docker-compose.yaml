name: breaktest

services:
  traefik:
    image: traefik:v3.7.1
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --api.insecure=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETS_ENCRYPT_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --log.level=${LOG_LEVEL:-INFO}
      - --accesslog=true
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme.json
    networks:
      - breaktest-network
    security_opt:
      - no-new-privileges:true

  frontend:
    image: ${BREAKTEST_IMAGE_REGISTRY:-breakingit}/breaktest-frontend:${BREAKTEST_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
      - traefik
    networks:
      - breaktest-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.breaktest-frontend.rule=${TRAEFIK_FRONTEND_RULE:-PathPrefix(`/`)}
      - traefik.http.routers.breaktest-frontend.entrypoints=${TRAEFIK_ENTRYPOINTS:-web}
      - traefik.http.routers.breaktest-frontend.priority=1
      - traefik.http.routers.breaktest-frontend.tls=${TRAEFIK_TLS:-false}
      - traefik.http.routers.breaktest-frontend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.breaktest-frontend.loadbalancer.server.port=3001
    security_opt:
      - no-new-privileges:true

  backend:
    image: ${BREAKTEST_IMAGE_REGISTRY:-breakingit}/breaktest-backend:${BREAKTEST_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - config.env
    environment:
      - AI_ASSISTANT_ENABLED=${AI_ASSISTANT_ENABLED:-false}
      - HERMES_URL=${HERMES_URL:-http://ai-assistant:8080}
      - HERMES_API_KEY=${HERMES_API_KEY:-breaktest-internal}
    volumes:
      - ${BACKUP_PATH:-./backups}:/backups
    depends_on:
      - mongodb
      - timescaledb
      - pg-proxy
      - traefik
    networks:
      - breaktest-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.breaktest-backend.rule=${TRAEFIK_BACKEND_RULE:-PathPrefix(`/api`)}
      - traefik.http.routers.breaktest-backend.entrypoints=${TRAEFIK_ENTRYPOINTS:-web}
      - traefik.http.routers.breaktest-backend.priority=100
      - traefik.http.routers.breaktest-backend.tls=${TRAEFIK_TLS:-false}
      - traefik.http.routers.breaktest-backend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.breaktest-backend.loadbalancer.server.port=3002
      - traefik.http.routers.breaktest-websocket.rule=${TRAEFIK_WEBSOCKET_RULE:-PathPrefix(`/ws`)}
      - traefik.http.routers.breaktest-websocket.entrypoints=${TRAEFIK_ENTRYPOINTS:-web}
      - traefik.http.routers.breaktest-websocket.priority=200
      - traefik.http.routers.breaktest-websocket.service=breaktest-backend
      - traefik.http.routers.breaktest-websocket.tls=${TRAEFIK_TLS:-false}
      - traefik.http.routers.breaktest-websocket.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
    security_opt:
      - no-new-privileges:true

  mongodb:
    image: mongo:8.3.2
    restart: unless-stopped
    command: ["mongod", "--logpath", "/var/log/mongodb/mongodb.log"]
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_logs:/var/log/mongodb
    networks:
      - breaktest-network
    security_opt:
      - no-new-privileges:true

  timescaledb:
    image: timescale/timescaledb:2.27.2-pg18
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TIMESCALEDB_TELEMETRY=off
    volumes:
      - timescaledb_data:/var/lib/postgresql
      - ${BACKUP_PATH:-./backups}:/backups
    networks:
      - breaktest-network
    command:
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
      - -c
      - timezone=${POSTGRES_TIMEZONE:-Europe/Amsterdam}
      - -c
      - log_timezone=${POSTGRES_TIMEZONE:-Europe/Amsterdam}
      - -c
      - fsync=${POSTGRES_FSYNC:-off}
      - -c
      - synchronous_commit=${POSTGRES_SYNCHRONOUS_COMMIT:-off}
      - -c
      - full_page_writes=${POSTGRES_FULL_PAGE_WRITES:-on}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-64MB}
    security_opt:
      - no-new-privileges:true

  pg-proxy:
    image: ${BREAKTEST_IMAGE_REGISTRY:-breakingit}/breaktest-pg-proxy:${BREAKTEST_VERSION:-latest}
    restart: unless-stopped
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MAX_INFLIGHT=${PG_PROXY_MAX_INFLIGHT:-512}
      - COPY_TIMEOUT_SEC=${PG_PROXY_COPY_TIMEOUT_SEC:-60}
      - PG_PROXY_MAX_CONNS=${PG_PROXY_MAX_CONNS:-100}
      - MAX_BODY_BYTES=${PG_PROXY_MAX_BODY_BYTES:-67108864}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - timescaledb
    networks:
      - breaktest-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.breaktest-pg-proxy.rule=${TRAEFIK_PG_PROXY_RULE:-PathPrefix(`/ingest`) || PathPrefix(`/upsert`)}
      - traefik.http.routers.breaktest-pg-proxy.entrypoints=${TRAEFIK_ENTRYPOINTS:-web}
      - traefik.http.routers.breaktest-pg-proxy.priority=150
      - traefik.http.routers.breaktest-pg-proxy.tls=${TRAEFIK_TLS:-false}
      - traefik.http.routers.breaktest-pg-proxy.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.breaktest-pg-proxy.loadbalancer.server.port=8080
    security_opt:
      - no-new-privileges:true

  ai-assistant:
    image: ${BREAKTEST_IMAGE_REGISTRY:-breakingit}/breaktest-ai-assistant:${BREAKTEST_VERSION:-latest}
    profiles:
      - ai-assistant
    restart: unless-stopped
    env_file:
      - config.env
    environment:
      - HERMES_API_KEY=${HERMES_API_KEY:-breaktest-internal}
      - API_SERVER_KEY=${HERMES_API_KEY:-breaktest-internal}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_ACCESS_TOKEN=${OPENAI_ACCESS_TOKEN:-}
      - OPENAI_REFRESH_TOKEN=${OPENAI_REFRESH_TOKEN:-}
      - OPENAI_TOKEN_EXPIRES=${OPENAI_TOKEN_EXPIRES:-}
      - OPENAI_EMAIL=${OPENAI_EMAIL:-}
      - AI_MODEL=${AI_MODEL:-}
    depends_on:
      - backend
    networks:
      - breaktest-network
    volumes:
      - hermes_data:/home/hermes/.hermes
    security_opt:
      - no-new-privileges:true

  loadgenerator:
    image: ${BREAKTEST_IMAGE_REGISTRY:-breakingit}/breaktest-loadgenerator:${BREAKTEST_VERSION:-latest}
    profiles:
      - loadgenerator
    restart: unless-stopped
    user: "${LOAD_GENERATOR_UID:-1000}:${LOAD_GENERATOR_GID:-1000}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      - backend
    networks:
      - breaktest-network
    volumes:
      - ./loadgenerator/files:/files
      - /sys/class/net:/host/sys/class/net:ro
      - /sys/devices:/host/sys/devices:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    environment:
      - CONTROLLER_HOST=backend
      - CONTROLLER_PORT=3002
      - CONTROLLER_SSL=false
      - LOAD_GENERATOR_TOKEN=${LOAD_GENERATOR_TOKEN:-local-token}
      - LOAD_GENERATOR_TYPE=local
      - LOAD_GENERATOR_NAME=${LOAD_GENERATOR_NAME:-loadgenerator}
      - LOAD_GENERATOR_LOCATION=${LOAD_GENERATOR_LOCATION:-Local}
      - LOAD_GENERATOR_RUN_MODE=${LOAD_GENERATOR_RUN_MODE:-process}
      - PUBLIC=${LOAD_GENERATOR_PUBLIC:-true}
      - CUSTOMER_NAME=${LOAD_GENERATOR_CUSTOMER_NAME:-Default}
      - SUPPORTS_SYNTHETIC_MONITORING=${LOAD_GENERATOR_SUPPORTS_SYNTHETIC_MONITORING:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

networks:
  breaktest-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_logs:
  timescaledb_data:
  traefik_acme:
  hermes_data:
